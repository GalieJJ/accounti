# Format:
#   nummer:
#     name: Kontenbezeichnung
#     typ: aktiv | passiv | erloes | aufwand | sonstiges
#     bwa_zeile: BWA-Form-01-Zeile (1-23)
#     steuer:
#       schluessel: DATEV BU-Schlüssel (oder null)
