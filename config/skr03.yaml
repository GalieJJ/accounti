# Vollständiger SKR03 hat ~1.500 Konten. Dies ist ein Starterset
# mit den häufigsten Konten für E-Commerce / KMU.
#
# Quellen:
# - DATEV Kontenrahmen SKR03
# - https://www.datev.de/dnlexom/client/app/index.html#/document/1080579
